<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Gym & Yoga Guide</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Gym & Yoga Guide</a>
            <div class="menu-toggle">&#9776;</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gym.html">Gym Exercises</a></li>
                <li><a href="yoga.html">Yoga</a></li>
                <li><a href="diet.html">Diet Plan</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <h2 class="section-title">Contact Us</h2>

        <div class="contact-container">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                    <div class="error-message" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email address">
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                    <div class="error-message" id="messageError"></div>
                </div>

                <button type="submit" class="btn"
                    style="width: 100%; border: none; cursor: pointer; font-size: 1.1rem;">Submit Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>Created by Yuvraj Singh and Sumit Gupta</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
